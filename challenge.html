<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cosmic Challenge ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cosmic Bloom">
  
  <style>
    :root {
      --primary-rose: #fcaec1;
      --soft-pink: #fbc8d4;
      --bg-overlay: rgba(58, 29, 33, 0.75);
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(251, 200, 212, 0.2);
      --text-light: #fff2f5;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: var(--text-light);
      background: linear-gradient(var(--bg-overlay), var(--bg-overlay)),
                  url("https://i.pinimg.com/1200x/1d/72/41/1d72416e266789afa33c189c365ded82.jpg") no-repeat center / cover;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
    }

    h1, h2 { font-family: 'Playfair Display', serif; color: var(--soft-pink); }

    .sidebar {
      width: 250px; background: rgba(58, 29, 33, 0.4); backdrop-filter: blur(20px);
      border-right: 1px solid var(--card-border); padding: 30px 20px; position: fixed; height: 100vh;
    }
    
    .nav-brand { 
  font-family: 'Playfair Display', serif; 
  font-style: italic; 
  font-weight: 700; 
  color: var(--soft-pink); 
  font-size: 2.2rem; 
  text-align: center; 
  margin-bottom: 40px; 
  text-shadow: 0 0 15px rgba(251, 200, 212, 0.3); 
}
    .nav-link {
      color: var(--text-light); text-decoration: none; padding: 14px;
      display: flex; align-items: center; gap: 10px; border-radius: 20px; margin-bottom: 10px;
    }
    .nav-link.active { background: var(--soft-pink); color: #3a1d21; font-weight: bold; }

    .main-content { margin-left: 250px; padding: 40px; flex: 1; display: flex; flex-direction: column; align-items: center; }

    .challenge-container {
      background: var(--card-bg); border: 1px solid var(--card-border);
      backdrop-filter: blur(15px); padding: 40px; border-radius: 32px;
      width: 100%; max-width: 500px; text-align: center;
    }

    .progress-box {
      width: 100%; height: 12px; background: rgba(0,0,0,0.3);
      border-radius: 10px; margin: 20px 0; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%; background: linear-gradient(90deg, var(--soft-pink), var(--primary-rose));
      transition: width 0.5s ease;
    }

    .challenge-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
      gap: 10px; width: 100%; max-width: 500px; margin-top: 30px;
    }
    .item-node {
      aspect-ratio: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-weight: bold;
    }
    .item-node.done { background: var(--primary-rose); color: #3a1d21; }

    input[type="number"] {
      background: transparent; border: none; color: var(--soft-pink);
      font-size: 3rem; font-weight: 700; width: 120px; text-align: center; outline: none;
    }

    #resetBtn {
      background: rgba(255, 82, 82, 0.2); border: 1px solid #ff5252;
      color: #ff5252; padding: 10px 20px; border-radius: 12px; cursor: pointer; margin-top: 20px;
    }

    @media (max-width: 768px) {
      .sidebar { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; padding: 5px; }
      .main-content { margin-left: 0; padding: 20px; }
    }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="nav-brand" onclick="window.location.href='anos.html'" style="cursor:pointer;">Cosmic Bloom</div>
  <a href="livros.html" class="nav-link"><i>📚</i> <span>Livros</span></a>
  <a href="challenge.html" class="nav-link active"><i>🏆</i> <span>Desafios</span></a>
  <a href="calendario.html" class="nav-link"><i>📅</i> <span>Agenda</span></a>
  <a href="favoritos.html" class="nav-link"><i>💜</i> <span>Favoritos</span></a>
  <a href="bingo.html" class="nav-link"><i>🎯</i> <span>Bingo</span></a>
  <a href="cores.html" class="nav-link"><i>🌈</i> <span>Paleta</span></a>
  <a href="A-z.html" class="nav-link"><i>🅰️</i> <span>Desafio A-Z</span></a>
  <a href="roleta.html" class="nav-link"><i>📍</i> <span>Roleta</span></a>
</nav>


  <main class="main-content">
    <div class="challenge-container">
      <h2>Leitura Anual</h2>
      <input type="number" id="goalInput" value="50">
      <div class="progress-box"><div class="progress-fill" id="bar"></div></div>
      <h3 id="statusText">0 / 50 livros lidos</h3>
      <button id="resetBtn">Zerar Progresso</button>
    </div>
    <div class="challenge-grid" id="grid"></div>
  </main>

<script>
  // Carrega a meta e o progresso do localStorage
  let goal = parseInt(localStorage.getItem('cosmic_goal')) || 50;
  let progresso = JSON.parse(localStorage.getItem('cosmic_challenge')) || [];

  const goalInput = document.getElementById('goalInput');
  const bar = document.getElementById('bar');
  const grid = document.getElementById('grid');

  // Inicializa o input com a meta salva
  goalInput.value = goal;

  function render() {
    const meta = parseInt(goalInput.value) || 0;
    
    // Atualiza a meta no localStorage quando o usuário digita
    if (meta !== goal) {
      goal = meta;
      localStorage.setItem('cosmic_goal', goal);
    }

    grid.innerHTML = '';
    for (let i = 1; i <= meta; i++) {
      const box = document.createElement('div');
      box.className = 'item-node' + (progresso.includes(i) ? ' done' : '');
      box.innerText = i;
      box.onclick = () => {
        if (progresso.includes(i)) {
          progresso = progresso.filter(n => n !== i);
        } else {
          progresso.push(i);
        }
        localStorage.setItem('cosmic_challenge', JSON.stringify(progresso));
        render();
      };
      grid.appendChild(box);
    }

    // Atualiza barra e texto
    const pct = meta > 0 ? (progresso.length / meta) * 100 : 0;
    bar.style.width = Math.min(pct, 100) + '%';
    document.getElementById('statusText').innerText = `${progresso.length} / ${meta} livros lidos`;
  }

  // Quando o usuário mudar o número, ele recalcula
  goalInput.oninput = render;

  // Zerar apenas o progresso, mantendo a meta (ou zere ambos se preferir)
  document.getElementById('resetBtn').onclick = () => { 
    if(confirm('Tem certeza que deseja limpar todo o seu progresso de leitura?')) { 
      progresso = []; 
      localStorage.removeItem('cosmic_challenge');
      render(); 
    } 
  };

  // Render inicial
  render();
</script>
</body>
</html>
