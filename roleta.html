<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cosmic Bloom • Roletas ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cosmic Bloom">

  <style>
    :root {
      --primary-rose: #fcaec1;
      --bg-overlay: rgba(58, 29, 33, 0.85);
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(251, 200, 212, 0.3);
      --text-light: #fff2f5;
    }

    body { margin: 0; font-family: 'Poppins', sans-serif; color: var(--text-light); background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), url("https://i.pinimg.com/1200x/1d/72/41/1d72416e266789afa33c189c365ded82.jpg") no-repeat center / cover; background-attachment: fixed; min-height: 100vh; display: flex; overflow: hidden; }

    .sidebar { width: 250px; background: rgba(58, 29, 33, 0.5); backdrop-filter: blur(20px); border-right: 1px solid var(--card-border); padding: 30px 20px; position: fixed; height: 100vh; z-index: 1000; }
    .nav-brand { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; color: var(--primary-rose); font-size: 2.2rem; text-align: center; margin-bottom: 40px; }
    .nav-link { color: var(--text-light); text-decoration: none; padding: 14px 18px; border-radius: 20px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; font-weight: 600; }
    .nav-link.active { background: var(--primary-rose); color: #3a1d21; }

    .main-content { margin-left: 250px; padding: 40px; flex: 1; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }

    .roleta-section { width: 100%; max-width: 500px; background: var(--card-bg); padding: 25px; border-radius: 25px; border: 1px solid var(--card-border); margin-bottom: 30px; }
    
    .pote-container { width: 100%; height: 80px; background: rgba(0,0,0,0.2); border-radius: 15px; display: flex; align-items: center; overflow: hidden; position: relative; margin-bottom: 15px; }
    .pote-mask { display: flex; transition: transform 4s cubic-bezier(0.1, 0.7, 0.2, 1); will-change: transform; }
    .pote-item { min-width: 200px; text-align: center; font-weight: 600; padding: 0 10px; }
    .selector { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--primary-rose); z-index: 10; box-shadow: 0 0 10px var(--primary-rose); }

    .item-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
    .item-tag { background: var(--primary-rose); color: #3a1d21; padding: 5px 12px; border-radius: 15px; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }
    .btn-delete { cursor: pointer; border: none; background: rgba(0,0,0,0.2); border-radius: 50%; width: 20px; height: 20px; font-size: 0.6rem; color: white; display: flex; align-items: center; justify-content: center; }
    
    .btn-spin { background: var(--primary-rose); color: #3a1d21; border: none; padding: 12px 30px; border-radius: 20px; font-weight: 700; cursor: pointer; width: 100%; }
    .input-row { display: flex; gap: 10px; margin-top: 15px; }
    input { background: rgba(255,255,255,0.1); border: 1px solid var(--card-border); padding: 8px; border-radius: 10px; color: white; flex: 1; }

    @media (max-width: 768px) {
      .sidebar { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; padding: 5px; }
      .main-content { margin-left: 0; padding: 20px 15px 100px; }
      .nav-brand { display: none; }
    }
  </style>
</head>
<body>

  <nav class="sidebar">
    <div class="nav-brand" onclick="window.location.href='anos.html'" style="cursor:pointer;">Cosmic Bloom</div>
    <a href="livros.html" class="nav-link"><i>📚</i> Livros</a>
      <a href="challenge.html" class="nav-link"><i>🏆</i> <span>Desafios</span></a>
    <a href="calendario.html" class="nav-link "><i>📅</i> Agenda</a>
   <a href="favoritos.html" class="nav-link"><i>💜</i> <span>Favoritos</span></a>
  <a href="bingo.html" class="nav-link "><i>🎯</i> <span>Bingo</span></a>
  <a href="cores.html" class="nav-link "><i>🌈</i> <span>Paleta</span></a>
  <a href="A-z.html" class="nav-link "><i>🅰️</i> <span>Desafio A-Z</span></a>
  <a href="roleta.html" class="nav-link active"><i>📍</i> <span>Roleta</span></a>
</nav>

  <main class="main-content">
    <h1 style="color: var(--primary-rose);">Minhas Roletas</h1>

    <div class="roleta-section">
      <h3 style="margin-top:0">Livros Únicos</h3>
      <div class="pote-container"><div class="selector"></div><div class="pote-mask" id="mask-unicos"></div></div>
      <button class="btn-spin" onclick="spin('unicos')">GIRAR ÚNICOS</button>
      <div class="input-row"><input id="input-unicos" placeholder="Adicionar livro..."> <button onclick="addItem('unicos')">➕</button></div>
      <div class="item-list" id="list-unicos"></div>
    </div>

    <div class="roleta-section">
      <h3 style="margin-top:0">Séries</h3>
      <div class="pote-container"><div class="selector"></div><div class="pote-mask" id="mask-series"></div></div>
      <button class="btn-spin" onclick="spin('series')">GIRAR SÉRIES</button>
      <div class="input-row"><input id="input-series" placeholder="Adicionar série..."> <button onclick="addItem('series')">➕</button></div>
      <div class="item-list" id="list-series"></div>
    </div>
  </main>

  <script>
    let data = JSON.parse(localStorage.getItem("roletas_data") || '{"unicos":[], "series":[]}');

    function render() {
      ['unicos', 'series'].forEach(tipo => {
        const mask = document.getElementById(`mask-${tipo}`);
        const list = document.getElementById(`list-${tipo}`);
        mask.innerHTML = "";
        list.innerHTML = "";
        
        if(data[tipo].length === 0) mask.innerHTML = '<div class="pote-item">Adicione itens...</div>';
        else {
          [...data[tipo], ...data[tipo], ...data[tipo]].forEach(t => {
            const div = document.createElement("div"); div.className = "pote-item"; div.innerText = t; mask.appendChild(div);
          });
          data[tipo].forEach((t, i) => {
            const span = document.createElement("div");
            span.className = "item-tag";
            span.innerHTML = `${t} <button class="btn-delete" onclick="deleteItem('${tipo}', ${i})">✕</button>`;
            list.appendChild(span);
          });
        }
      });
      localStorage.setItem("roletas_data", JSON.stringify(data));
    }

    function addItem(tipo) {
      const input = document.getElementById(`input-${tipo}`);
      if(input.value) { data[tipo].push(input.value); input.value = ""; render(); }
    }

    function deleteItem(tipo, idx) { data[tipo].splice(idx, 1); render(); }

    function spin(tipo) {
      if(data[tipo].length < 2) return alert("Adicione pelo menos 2 itens!");
      const mask = document.getElementById(`mask-${tipo}`);
      const randomOffset = Math.floor(Math.random() * data[tipo].length);
      mask.style.transition = "transform 4s cubic-bezier(0.1, 0.7, 0.2, 1)";
      mask.style.transform = `translateX(-${(data[tipo].length + randomOffset) * 200}px)`;
      setTimeout(() => { alert("O destino escolheu: " + data[tipo][randomOffset]); mask.style.transition = "none"; mask.style.transform = `translateX(0)`; }, 4500);
    }

    render();
  </script>
</body>
</html>
