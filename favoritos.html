<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cosmic Bloom • Paleta Literária ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cosmic Bloom">
  
  <style>
    :root {
      --primary-rose: #fcaec1;
      --soft-pink: #fbc8d4;
      --bg-overlay: rgba(58, 29, 33, 0.75);
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(251, 200, 212, 0.2);
      --text-light: #fff2f5;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0; font-family: 'Poppins', sans-serif; color: var(--text-light);
      background: linear-gradient(var(--bg-overlay), var(--bg-overlay)),
                  url("https://i.pinimg.com/1200x/1d/72/41/1d72416e266789afa33c189c365ded82.jpg") no-repeat center / cover;
      background-attachment: fixed; min-height: 100vh; display: flex;
      overflow: hidden; /* Trava o scroll do body, forçando o scroll no .main-content */
    }

    /* SIDEBAR */
    .sidebar { width: 250px; background: rgba(58, 29, 33, 0.4); backdrop-filter: blur(20px); border-right: 1px solid var(--card-border); padding: 30px 20px; position: fixed; height: 100vh; z-index: 1000; }
    .nav-brand { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; color: var(--primary-rose); font-size: 2.2rem; text-align: center; margin-bottom: 40px; }
    .nav-link { color: var(--text-light); text-decoration: none; padding: 14px 18px; border-radius: 20px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; font-weight: 600; transition: 0.3s; }
    .nav-link.active { background: var(--primary-rose); color: #3a1d21; }

    /* MAIN */
.main-content { 
      margin-left: 250px; 
      padding: 40px; 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      align-items: center;
      height: 100vh; /* Garante que o container ocupe a tela toda */
      overflow-y: auto; /* O scroll acontece aqui dentro */
    }
    .header-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-style: italic; color: var(--primary-rose); margin-bottom: 30px; }

    /* PROGRESSO */
    .progress-wrapper { width: 100%; max-width: 800px; margin-bottom: 30px; text-align: center; }
    .rainbow-progress-container { width: 100%; height: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; display: flex; margin-top: 10px; overflow: hidden; border: 1px solid var(--card-border); }
    .progress-segment { height: 100%; }

    /* GRID DE CORES */
    .color-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
      gap: 20px; 
      width: 100%; 
      max-width: 850px; 
      padding-bottom: 50px; /* Margem para não cortar o último item */
    }
    .color-card { aspect-ratio: 1 / 1.3; background: var(--card-bg); border-radius: 25px; border: 1px solid var(--card-border); position: relative; overflow: hidden; transition: 0.3s; cursor: pointer; }
    .color-card.selected { border-color: var(--primary-rose); transform: scale(1.02); }

    .photo-area { height: 75%; width: 100%; background: rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; position: relative; }
    .photo-area img { width: 100%; height: 100%; object-fit: cover; }
    .color-label { height: 25%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }

    .check-badge { position: absolute; top: 10px; left: 10px; background: var(--primary-rose); color: #3a1d21; width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; transform: scale(0); transition: 0.3s; }
    .color-card.selected .check-badge { transform: scale(1); }

    @media (max-width: 768px) {
      .sidebar { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; padding: 5px; }
      .nav-brand { display: none; }
      .main-content { margin-left: 0; padding: 20px 15px 100px; }
      .color-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <nav class="sidebar">
    <div class="nav-brand" onclick="window.location.href='anos.html'" style="cursor:pointer;">Cosmic Bloom</div>
    <a href="livros.html" class="nav-link"><i>📚</i> Livros</a>
      <a href="challenge.html" class="nav-link"><i>🏆</i> <span>Desafios</span></a>
    <a href="calendario.html" class="nav-link"><i>📅</i> Agenda</a>
    <a href="favoritos.html" class="nav-link "><i>💜</i> Favoritos</a>
    <a href="bingo.html" class="nav-link"><i>🎯</i> Bingo</a>
    <a href="cores.html" class="nav-link active"><i>🌈</i> Paleta</a>
    <a href="A-z.html" class="nav-link"><i>🅰️</i> Desafio A-Z</a>
    <a href="roleta.html" class="nav-link"><i>📍</i> Roleta</a>
  </nav>

  <main class="main-content">
    <h1 class="header-title">Paleta Literária</h1>
    <div class="progress-wrapper">
      <span id="counterLabel" style="font-weight: 600; color: var(--primary-rose);">0 de 12 completadas</span>
      <div class="rainbow-progress-container" id="progressBar"></div>
    </div>
    <div class="color-grid" id="colorGrid"></div>
  </main>

  <script>
    const dbName = "CosmicBloomCores", storeName = "fotosCores";
    let db;

    const initDB = () => new Promise(res => {
      const req = indexedDB.open(dbName, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(storeName);
      req.onsuccess = e => { db = e.target.result; res(); };
    });

    const getEstadoCores = () => new Promise(res => {
      const store = db.transaction(storeName, "readonly").objectStore(storeName);
      store.getAllKeys().onsuccess = async e => {
        const estado = {};
        for(let key of e.target.result) {
          estado[key] = await new Promise(r => store.get(key).onsuccess = ev => r(ev.target.result));
        }
        res(estado);
      };
    });

    const colors = [
      { name: "Vermelho", hex: "#ef5350" }, { name: "Laranja", hex: "#ff9800" },
      { name: "Amarelo", hex: "#fdd835" }, { name: "Verde", hex: "#66bb6a" },
      { name: "Azul", hex: "#42a5f5" }, { name: "Marinho", hex: "#1a237e" },
      { name: "Rosa", hex: "#ec407a" }, { name: "Roxo", hex: "#ab47bc" },
      { name: "Cinza", hex: "#78909c" }, { name: "Preto", hex: "#263238" },
      { name: "Marrom", hex: "#8d6e63" }, { name: "Branco", hex: "#ffffff" }
    ];

    let estadoCores = {};
    async function update() { estadoCores = await getEstadoCores(); render(); }

    function render() {
      const grid = document.getElementById("colorGrid");
      grid.innerHTML = "";
      let total = 0, bar = document.getElementById("progressBar");
      bar.innerHTML = "";

      colors.forEach((c, i) => {
        const info = estadoCores[i];
        if(info?.selected) { total++; bar.innerHTML += `<div class="progress-segment" style="width:${100/12}%; background:${c.hex}"></div>`; }
        
        const card = document.createElement("div");
        card.className = `color-card ${info?.selected ? 'selected' : ''}`;
        card.innerHTML = `<div class="photo-area"><div class="check-badge">✓</div>${info?.img ? `<img src="${info.img}">` : `<span style="opacity:0.3">📷</span>`}</div><div class="color-label" style="background:${c.hex}; color:${c.hex==='#ffffff'?'#333':'white'}">${c.name}</div>`;
        card.onclick = () => {
          if(info?.selected && confirm(`Remover ${c.name}?`)) {
            const tx = db.transaction(storeName, "readwrite");
            tx.objectStore(storeName).delete(i);
            tx.oncomplete = update;
          } else {
            const input = document.createElement("input");
            input.type = "file"; input.onchange = e => {
              const reader = new FileReader();
              reader.onload = ev => {
                const tx = db.transaction(storeName, "readwrite");
                tx.objectStore(storeName).put({selected: true, img: ev.target.result}, i);
                tx.oncomplete = update;
              };
              reader.readAsDataURL(e.target.files[0]);
            };
            input.click();
          }
        };
        grid.appendChild(card);
      });
      document.getElementById("counterLabel").innerText = `${total} de 12 cores completadas`;
    }

    initDB().then(update);
  </script>
</body>
</html>
