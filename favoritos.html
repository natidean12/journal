<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cosmic Bloom • Favoritos ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <meta name="apple-mobile-web-app-title" content="Cosmic Bloom">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icone.png">
  <link rel="manifest" href="manifest.json">

  <style>
    /* Seu CSS permanece original para manter o design */
    :root {
      --primary-lavender: #d1c4e9;
      --secondary-berry: #a3617b;
      --accent-gold: #fbc02d;
      --bg-dark-purple: #3a2b4f;
      --bg-light-purple: #5c4b7d;
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.15);
      --text-light: #f8f8f8;
      --text-muted: #e0e0e0;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: var(--text-light);
      background: radial-gradient(circle at bottom left, var(--bg-light-purple) 0%, var(--bg-dark-purple) 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 250px;
      background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border-right: 1px solid var(--card-border);
      display: flex; flex-direction: column; padding: 30px 20px;
      position: fixed; height: 100vh; z-index: 1000;
      box-shadow: 2px 0 15px rgba(0,0,0,0.2);
    }
    .nav-brand { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; color: var(--primary-lavender); font-size: 2.2rem; text-align: center; margin-bottom: 40px; }
    .nav-link { color: var(--text-muted); text-decoration: none; padding: 14px 18px; border-radius: 25px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; font-weight: 600; }
    .nav-link.active { background: linear-gradient(45deg, var(--secondary-berry) 0%, var(--primary-lavender) 100%); color: white; }

    .main-content { margin-left: 250px; padding: 40px; flex: 1; display: flex; flex-direction: column; align-items: center; }
    .header-title { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-style: italic; color: var(--primary-lavender); margin-bottom: 10px; text-align: center; }
    .header-subtitle { font-size: 0.9rem; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; opacity: 0.8; }

    .month-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 30px; width: 100%; max-width: 1100px; padding-bottom: 100px; }
    .month-card { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--card-border); padding: 18px; border-radius: 30px; text-align: center; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .month-card:hover { transform: translateY(-8px) scale(1.02); border-color: var(--primary-lavender); }

    .month-name { font-weight: 700; color: var(--primary-lavender); margin-bottom: 15px; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1.5px; }
    .photo-frame { width: 100%; aspect-ratio: 2/3; background: rgba(0, 0, 0, 0.3); border-radius: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px dashed var(--card-border); }
    .photo-frame img { width: 100%; height: 100%; object-fit: cover; animation: fadeIn 0.5s ease; }
    .book-title { margin-top: 15px; font-size: 0.9rem; color: var(--accent-gold); font-weight: 600; min-height: 1.2em; font-style: italic; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    @media (max-width: 768px) {
      .sidebar { width: 100%; height: 75px; bottom: 0; top: auto; flex-direction: row; padding: 0; justify-content: space-around; border-right: none; border-top: 1px solid var(--card-border); }
      .nav-brand { display: none; }
      .main-content { margin-left: 0; padding: 20px 15px 100px; }
      .nav-link { flex-direction: column; font-size: 0.6rem; gap: 4px; padding: 10px 5px; margin-bottom: 0; }
      .month-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
    }
  </style>
</head>
<body>

  <nav class="sidebar">
    <div class="nav-brand">Cosmic Bloom</div>
    <a href="livros.html" class="nav-link"><i>📚</i> Livros</a>
    <a href="challenge.html" class="nav-link"><i>🏆</i> Desafios</a>
    <a href="calendario.html" class="nav-link"><i>📅</i> Agenda</a>
    <a href="favoritos.html" class="nav-link active"><i>💜</i> Favoritos</a>
    <a href="bingo.html" class="nav-link"><i>🎯</i> Bingo Literário</a>
    <a href="cores.html" class="nav-link"><i>🌈</i> Paleta Literária</a>
    <a href="A-z.html" class="nav-link"><i>🅰️</i> Desafio A-Z</a>
  </nav>

  <main class="main-content">
    <h1 class="header-title">Melhor do Mês</h1>
    <p class="header-subtitle">Sua jornada literária em destaque</p>
    <div class="month-grid" id="monthGrid"></div>
  </main>

  <script>
    // --- LÓGICA DO INDEXEDDB PARA FAVORITOS ---
    const dbName = "CosmicBloomFavoritos";
    const storeName = "melhorDoMes";
    let db;

    const initDB = () => {
      return new Promise((resolve) => {
        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = (e) => {
          e.target.result.createObjectStore(storeName);
        };
        request.onsuccess = (e) => {
          db = e.target.result;
          resolve();
        };
      });
    };

    const getEstadoFavoritos = () => {
      return new Promise((resolve) => {
        const transaction = db.transaction([storeName], "readonly");
        const store = transaction.objectStore(storeName);
        const request = store.getAllKeys();
        request.onsuccess = async () => {
          const keys = request.result;
          const estado = {};
          for (let key of keys) {
            estado[key] = await new Promise(r => {
              const req = store.get(key);
              req.onsuccess = () => r(req.result);
            });
          }
          resolve(estado);
        };
      });
    };

    const salvarFavoritoDB = (month, data) => {
      return new Promise((resolve) => {
        const transaction = db.transaction([storeName], "readwrite");
        transaction.objectStore(storeName).put(data, month);
        transaction.oncomplete = () => resolve();
      });
    };

    const removerFavoritoDB = (month) => {
      return new Promise((resolve) => {
        const transaction = db.transaction([storeName], "readwrite");
        transaction.objectStore(storeName).delete(month);
        transaction.oncomplete = () => resolve();
      });
    };

    // --- LÓGICA DA INTERFACE ---
    const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    let estadoMeses = {};
    let clickTimer = null;

    async function atualizarInterface() {
      estadoMeses = await getEstadoFavoritos();
      render();
    }

    function render() {
      const grid = document.getElementById("monthGrid");
      if(!grid) return;
      grid.innerHTML = "";

      months.forEach(month => {
        const card = document.createElement("div");
        card.className = "month-card";
        const info = estadoMeses[month];
        
        card.innerHTML = `
          <div class="month-name">${month}</div>
          <div class="photo-frame" style="${info ? 'border-style: solid' : ''}">
            ${info ? `<img src="${info.img}">` : '<span style="font-size:2.5rem; opacity:0.2;">✨</span>'}
          </div>
          <div class="book-title">${(info && info.title) ? info.title : ""}</div>
        `;

        card.onclick = () => {
          if (clickTimer == null) {
            clickTimer = setTimeout(() => {
              clickTimer = null;
              abrirCamera(month);
            }, 300);
          } else {
            clearTimeout(clickTimer);
            clickTimer = null;
            if(confirm(`Deseja remover o destaque de ${month}?`)) {
              removerFavoritoDB(month).then(atualizarInterface);
            }
          }
        };
        grid.appendChild(card);
      });
    }

    function abrirCamera(month) {
      const input = document.createElement("input");
      input.type = "file"; input.accept = "image/*";
      input.onchange = () => {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const max_size = 600; // Um pouco maior para os favoritos ficarem bonitos
            let w = img.width, h = img.height;
            if (w > h) { if (w > max_size) { h *= max_size / w; w = max_size; } }
            else { if (h > max_size) { w *= max_size / h; h = max_size; } }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            
            const base64 = canvas.toDataURL('image/jpeg', 0.7); // Qualidade um pouco maior
            const nomeLivro = prompt("Qual livro brilhou em " + month + "?");
            
            salvarFavoritoDB(month, { 
              img: base64, 
              title: nomeLivro || "" 
            }).then(atualizarInterface);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }

    initDB().then(atualizarInterface);
  </script>
</body>
</html>
