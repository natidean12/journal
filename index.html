<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="apple-mobile-web-app-title" content="Cosmic Bloom">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cosmic Bloom">
  
  <title>Cosmic Bloom ✨</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-rose: #fcaec1;      
      --soft-pink: #fbc8d4;         
      --vintage-gold: #cca05a;      
      --bg-overlay: rgba(58, 29, 33, 0.65); 
      --text-light: #fff2f5;        
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      color: #fff;
      min-height: 100vh;
      background: 
        linear-gradient(var(--bg-overlay), var(--bg-overlay)),
        url("https://i.pinimg.com/1200x/1d/72/41/1d72416e266789afa33c189c365ded82.jpg") no-repeat center / cover;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .container {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 40px;
      border: 1px solid rgba(251, 200, 212, 0.2);
      text-align: center;
      animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1);
      box-shadow: 0 25px 50px rgba(58, 29, 33, 0.4);
    }

    @media (max-width: 440px) {
      .card {
        width: 92%;
        padding: 60px 25px;
      }
      .titulo { font-size: 2.8rem; }
      .descricao { font-size: 1.1rem; }
    }

    @media (min-width: 768px) {
      .card {
        width: 100%;
        max-width: 580px;
        padding: 80px 60px;
      }
      .titulo { font-size: 3.8rem; }
      .descricao { font-size: 1.4rem; }
    }

    .titulo {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -1px;
      background: linear-gradient(to bottom, #ffffff, var(--soft-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(251, 200, 212, 0.2);
    }

    .descricao {
      color: var(--text-light);
      opacity: 0.85;
      margin-bottom: 50px;
      line-height: 1.6;
      font-weight: 300;
    }

    button {
      background: linear-gradient(135deg, var(--soft-pink), var(--primary-rose));
      color: #3a1d21; 
      border: 2px solid rgba(204, 160, 90, 0.3); 
      width: 100%;
      padding: 22px;
      font-size: 1.25rem;
      font-weight: 700;
      border-radius: 22px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 15px 30px rgba(252, 174, 193, 0.3);
      font-family: 'Poppins', sans-serif;
    }

    button:active {
      transform: scale(0.96);
      opacity: 0.9;
    }

    .frase-container {
      margin-top: 45px;
      height: 60px;
    }

    .frase {
      font-size: 1.1rem;
      font-style: italic;
      color: var(--text-light);
      opacity: 0.6;
      transition: opacity 0.6s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h1 class="titulo">Cosmic Bloom</h1>
    <p class="descricao">
      Seu espaço sagrado para registrar<br> 
      cada capítulo da sua história.
    </p>

    <button id="entrarBtn">Carregando Universo...</button>

    <div class="frase-container">
        <div class="frase" id="frase">“Um leitor vive mil vidas.”</div>
    </div>
  </div>
</div>

<script>
const btn = document.getElementById("entrarBtn");
const fraseEl = document.getElementById("frase");

// Personalização do botão por horário
const hora = new Date().getHours();
if (hora >= 5 && hora < 12) btn.textContent = "Bom dia! Entrar no Cosmos 📚";
else if (hora >= 12 && hora < 18) btn.textContent = "Boa tarde! Abrir Jardim Literário 🌸";
else btn.textContent = "Boa noite! Ler na Biblioteca 🌙";

const frases = [
  "“Um leitor vive mil vidas.”",
  "“Livros são sonhos em papel.”",
  "“Cada página é um refúgio.”",
  "“Ler é um ato de cuidado.”",
  "“O universo guarda suas memórias.”"
];

let idx = 0;
setInterval(() => {
  fraseEl.style.opacity = 0;
  setTimeout(() => {
    idx = (idx + 1) % frases.length;
    fraseEl.textContent = frases[idx];
    fraseEl.style.opacity = 0.6;
  }, 600);
}, 5000);

// O botão só muda de página ao clicar fisicamente nele
btn.addEventListener("click", () => {
  window.location.href = "livros.html";
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(() => console.log("Service Worker Ativo!"))
    .catch((err) => console.log("Erro SW:", err));
}
</script>
</body>
</html>
