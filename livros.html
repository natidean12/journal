<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Cosmic Bloom Library ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  <meta name="apple-mobile-web-app-title" content="Cosmic Bloom">
  <link class="apple-touch-icon" href="icone.png">
  <link rel="manifest" href="manifest.json">

  <style>
    /* Nova paleta de cores baseada no tom de rosa do código anterior */
    :root {
      --primary-rose: #fcaec1;      
      --soft-pink: #fbc8d4;         
      --vintage-gold: #cca05a;      
      --bg-overlay: rgba(58, 29, 33, 0.65); 
      --card-bg: rgba(255, 255, 255, 0.08); 
      --card-border: rgba(251, 200, 212, 0.2);
      --text-light: #fff2f5;
      --text-muted: #fbc8d4;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: var(--text-light);
      /* Fundo com a imagem do cosmos e overlay idêntico ao primeiro */
      background: 
        linear-gradient(var(--bg-overlay), var(--bg-overlay)),
        url("https://i.pinimg.com/1200x/1d/72/41/1d72416e266789afa33c189c365ded82.jpg") no-repeat center / cover;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
    }

    h1, h2, .nav-brand { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; color: var(--soft-pink); }

    .sidebar {
      width: 250px;
      background: rgba(58, 29, 33, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      padding: 30px 20px;
      position: fixed;
      height: 100vh;
      z-index: 1000;
      overflow-y: auto;
      box-shadow: 2px 0 15px rgba(0,0,0,0.2);
    }
    
    .nav-brand { font-size: 2.2rem; text-align: center; margin-bottom: 40px; text-shadow: 0 0 15px rgba(251, 200, 212, 0.3); }
    
    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      padding: 14px 18px;
      border-radius: 25px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 15px;
      font-weight: 600;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .nav-link::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.1);
      transition: all 0.4s ease;
    }
    
    .nav-link:hover::before { left: 0; }
    
    .nav-link.active {
      background: linear-gradient(135deg, var(--soft-pink), var(--primary-rose));
      color: #3a1d21;
      box-shadow: 0 8px 20px rgba(252, 174, 193, 0.3);
      transform: translateX(5px);
    }

    .main-content { margin-left: 250px; padding: 40px; flex: 1; }
    
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding-bottom: 30px;
      position: sticky;
      top: 0;
      background: linear-gradient(to bottom, rgba(58, 29, 33, 0.9) 0%, rgba(58, 29, 33, 0.6) 70%, transparent 100%);
      z-index: 900;
    }
    
    .pages-badge {
      background: var(--vintage-gold);
      color: #3a1d21;
      padding: 10px 22px;
      border-radius: 50px;
      font-weight: 700;
      box-shadow: 0 6px 15px rgba(204, 160, 90, 0.3);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin-bottom: 50px;
    }
    
    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    
    .stat-card small { color: var(--soft-pink); font-weight: 300; }
    .stat-card strong { font-size: 2.2rem; font-weight: 700; color: #ffffff; display: block; margin-top: 5px; }

    .year-header {
      font-size: 2.5rem;
      margin: 60px 0 30px;
      color: var(--soft-pink);
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .year-header::after { content: ""; flex: 1; height: 2px; background: var(--card-border); }

    .books-grid {
      display: grid;
      gap: 30px;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    }

    .book-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 15px;
      transition: transform 0.4s ease-out;
      text-align: center;
    }
    
    .book-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: 12px;
      background: #4a2429;
      margin-bottom: 15px;
    }

    .stars { color: var(--vintage-gold); margin-bottom: 12px; font-size: 1.2rem; }
    .half-star { position: relative; display: inline-block; color: rgba(255,255,255,0.2); }
    .half-star::before { content: "★"; position: absolute; left: 0; width: 50%; overflow: hidden; color: var(--vintage-gold); }

    .book-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      border-top: 1px solid var(--card-border);
      padding-top: 15px;
    }
    
    .book-actions button {
      background: rgba(255,255,255,0.15);
      border: none;
      width: 40px; height: 40px;
      border-radius: 12px;
      cursor: pointer;
      color: var(--text-light);
    }
    
    .del-btn.warning { background: #ff5252 !important; animation: pulse 0.6s infinite; }

    #addBtn {
      position: fixed; bottom: 40px; right: 40px;
      width: 60px; height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--soft-pink), var(--primary-rose));
      color: #3a1d21;
      font-size: 2.5rem;
      border: none;
      cursor: pointer;
      z-index: 1100;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 10px 25px rgba(252, 174, 193, 0.4);
    }

    .modal {
      position: fixed; inset: 0;
      background: rgba(38, 19, 22, 0.7);
      backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease;
    }
    
    .modal.show { opacity: 1; visibility: visible; }
    
    .modal-content {
      background: rgba(58, 29, 33, 0.95);
      border: 1px solid var(--card-border);
      padding: 35px;
      border-radius: 30px;
      width: 90%; max-width: 450px;
    }

    input, select {
      width: 100%; padding: 16px; margin: 10px 0;
      border-radius: 18px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.05);
      color: var(--text-light);
    }

    #starsSelect { text-align:center; font-size:3rem; margin:15px 0; }
    #starsSelect span { cursor:pointer; color: rgba(255,255,255,0.2); position: relative; display: inline-block; }
    #starsSelect span.selected { color: var(--vintage-gold); }
    #starsSelect span.half-selected::before { content: "★"; position: absolute; left: 0; width: 50%; overflow: hidden; color: var(--vintage-gold); }

    .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
    .modal-buttons button { flex: 1; padding: 16px; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; }
    #saveBook { background: linear-gradient(135deg, var(--soft-pink), var(--primary-rose)); color: #3a1d21; }
    #closeModal { background: rgba(255,255,255,0.1); color: var(--text-muted); }

    @media (max-width: 768px) {
      .sidebar { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; padding: 0; }
      .nav-brand { display: none; }
      .main-content { margin-left: 0; padding: 20px 15px 100px; }
      .books-grid { grid-template-columns: repeat(2, 1fr); }
      #addBtn { bottom: 85px; right: 15px; }
    }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
  </style>
</head>
<body>

 <nav class="sidebar">
    <div class="nav-brand">Cosmic Bloom</div>
    <a href="livros.html" class="nav-link active"><i>📚</i> Livros</a>
    <a href="challenge.html" class="nav-link"><i>🏆</i> Desafios</a>
    <a href="calendario.html" class="nav-link "><i>📅</i> Agenda</a>
    <a href="favoritos.html" class="nav-link "><i>💜</i> Favoritos</a>
    <a href="bingo.html" class="nav-link"><i>🎯</i> Bingo Literário</a>
    <a href="cores.html" class="nav-link"><i>🌈</i> Paleta Literária</a>
    <a href="A-z.html" class="nav-link"><i>🅰️</i> Desafio A-Z</a>
    <a href="roleta.html" class="nav-link"><i>📍</i> Roleta</a>
  </nav>

  <main class="main-content">
    <div class="top-bar">
      <div class="pages-badge">✨ <span id="totalPgs">0</span> pgs lidas</div>
    </div>

    <div class="stats-container">
      <div class="stat-card"><small>Livros Lidos</small><strong id="stLido">0</strong></div>
      <div class="stat-card"><small>Lendo Agora</small><strong id="stLendo">0</strong></div>
      <div class="stat-card"><small>Favoritos</small><strong id="stFav">0</strong></div>
      <div class="stat-card"><small>Média Estrelas</small><strong id="stMedia">0.0</strong></div>
    </div>
    <div id="yearContainers"></div>
  </main>

  <button id="addBtn">＋</button>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Novo Registro Mágico</h2>
      <input type="file" id="bookFile" accept="image/*">
      <input type="text" id="inputTitle" placeholder="Título do Livro"> 
      <input type="number" id="inputPages" placeholder="Total de Páginas">
      <input type="number" id="inputYear" placeholder="Ano de Leitura" value="2026">
      <select id="statusSelect">
        <option value="lido">📕 Já li (Concluído)</option>
        <option value="lendo">📖 Lendo Agora</option>
        <option value="quero">📘 Quero Ler</option>
      </select>
      <div id="starsSelect">
        <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
      </div>
      <div class="modal-buttons">
        <button id="saveBook">✨ Salvar no Cosmos</button>
        <button id="closeModal">Voltar</button>
      </div>
    </div>
  </div>

  <script>
    // --- SEGURANÇA CONTRA ZOOM GESTUAL NO IPAD (HOME SCREEN APP) ---
    document.addEventListener('gesturestart', function (e) {
      e.preventDefault();
    });

    // --- LÓGICA DO INDEXEDDB ---
    const dbName = "CosmicBloomDB";
    const storeName = "livros";
    let db;

    const initDB = () => {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(storeName)) {
            db.createObjectStore(storeName, { keyPath: "id" });
          }
        };
        request.onsuccess = (e) => {
          db = e.target.result;
          resolve(db);
        };
        request.onerror = (e) => reject("Erro ao abrir banco");
      });
    };

    const getAllBooks = () => {
      return new Promise((resolve) => {
        const transaction = db.transaction([storeName], "readonly");
        const store = transaction.objectStore(storeName);
        const request = store.getAll();
        request.onsuccess = () => resolve(request.result || []);
      });
    };

    const saveBookDB = (book) => {
      return new Promise((resolve) => {
        const transaction = db.transaction([storeName], "readwrite");
        const store = transaction.objectStore(storeName);
        store.put(book);
        transaction.oncomplete = () => resolve();
      });
    };

    const deleteBookDB = (id) => {
      return new Promise((resolve) => {
        const transaction = db.transaction([storeName], "readwrite");
        const store = transaction.objectStore(storeName);
        store.delete(id);
        transaction.oncomplete = () => resolve();
      });
    };

    // --- LÓGICA DO APP ---
    let books = [];
    let selectedStars = 0;
    let selectedImage = "";
    let editId = null;

    async function atualizarInterface() {
      books = await getAllBooks();
      renderBooks();
    }

    function renderStarsHtml(val) {
      let html = '';
      for (let i = 1; i <= 5; i++) {
        if (i <= Math.floor(val)) html += '<span>★</span>';
        else if (i === Math.ceil(val) && val % 1 !== 0) html += '<span class="half-star">★</span>';
        else html += '<span style="color:rgba(255,255,255,0.2)">★</span>';
      }
      return html;
    }

    function renderBooks() {
      const container = document.getElementById("yearContainers");
      if(!container) return;
      container.innerHTML = "";
      
      const lidos = books.filter(b => b.status === 'lido');
      document.getElementById("totalPgs").innerText = lidos.reduce((acc, b) => acc + (parseInt(b.pages) || 0), 0).toLocaleString('pt-BR');
      document.getElementById("stLido").innerText = lidos.length;
      document.getElementById("stLendo").innerText = books.filter(b => b.status === 'lendo').length;
      document.getElementById("stFav").innerText = books.filter(b => b.favorito).length;
      
      const media = lidos.length ? (lidos.reduce((a,b) => a + (b.estrelas || 0), 0) / lidos.length).toFixed(1) : "0.0";
      document.getElementById("stMedia").innerText = media;

      const years = [...new Set(books.map(b => b.year || new Date().getFullYear()))].sort((a,b) => b - a);
      
      years.forEach(year => {
        const section = document.createElement("div");
        section.innerHTML = `<h2 class="year-header">${year}</h2><div class="books-grid" id="grid-${year}"></div>`;
        container.appendChild(section);
        
        books.filter(b => (b.year || new Date().getFullYear()) == year).forEach(book => {
          const card = document.createElement("div");
          card.className = "book-card";
          card.innerHTML = `
            <img src="${book.capa || 'https://i.ibb.co/C07F1kL/placeholder-book-cover.png'}" loading="lazy">
            <h3 style="font-size:1.1rem; margin:0 0 8px;">${book.title || 'Sem Título'}</h3>
            <div class="stars">${renderStarsHtml(book.estrelas || 0)}</div>
            <div class="book-actions">
              <button class="fav-btn">${book.favorito ? "💜" : "🤍"}</button>
              <button class="edit-btn">✏️</button>
              <button class="del-btn">🗑️</button>
            </div>
          `;
          
          card.querySelector(".del-btn").onclick = async function() {
            if (!this.classList.contains("warning")) {
              this.classList.add("warning");
              setTimeout(() => this.classList.remove("warning"), 2500);
            } else {
              await deleteBookDB(book.id);
              atualizarInterface();
            }
          };
          
          card.querySelector(".fav-btn").onclick = async () => { 
            book.favorito = !book.favorito; 
            await saveBookDB(book);
            atualizarInterface();
          };
          
          card.querySelector(".edit-btn").onclick = () => {
            editId = book.id; 
            selectedStars = book.estrelas; 
            selectedImage = book.capa;
            document.getElementById("inputTitle").value = book.title;
            document.getElementById("inputPages").value = book.pages;
            document.getElementById("inputYear").value = book.year;
            document.getElementById("statusSelect").value = book.status;
            atualizarEstrelasVisual();
            document.getElementById("modal").classList.add("show");
          };
          
          document.getElementById(`grid-${year}`).appendChild(card);
        });
      });
    }

    function comprimirImagem(file, callback) {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const max_size = 300;
          let width = img.width;
          let height = img.height;

          if (width > height) {
            if (width > max_size) { height *= max_size / width; width = max_size; }
          } else {
            if (height > max_size) { width *= max_size / height; height = max_size; }
          }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          callback(canvas.toDataURL('image/jpeg', 0.5));
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }

    document.getElementById("bookFile").onchange = e => {
      const file = e.target.files[0];
      if (file) comprimirImagem(file, (base64) => { selectedImage = base64; });
    };

    document.querySelectorAll("#starsSelect span").forEach((s, i) => {
      s.onclick = () => {
        let val = i + 1;
        if (selectedStars === val) selectedStars = val - 0.5;
        else if (selectedStars === (val - 0.5)) selectedStars = 0;
        else selectedStars = val;
        atualizarEstrelasVisual();
      };
    });

    function atualizarEstrelasVisual() {
      document.querySelectorAll("#starsSelect span").forEach((s, i) => {
        let val = i + 1;
        s.classList.remove("selected", "half-selected");
        if (val <= Math.floor(selectedStars)) s.classList.add("selected");
        else if (val === Math.ceil(selectedStars) && selectedStars % 1 !== 0) s.classList.add("half-selected");
      });
    }

    document.getElementById("addBtn").onclick = () => {
      editId = null; selectedStars = 0; selectedImage = "";
      document.getElementById("inputTitle").value = "";
      document.getElementById("inputPages").value = "";
      atualizarEstrelasVisual();
      document.getElementById("modal").classList.add("show");
    };

    document.getElementById("closeModal").onclick = () => document.getElementById("modal").classList.remove("show");

    document.getElementById("saveBook").onclick = async () => {
      // Busca segura para evitar falhas ao editar registros
      const livroExistente = editId ? books.find(b => b.id === editId) : null;

      const bookData = {
        id: editId || crypto.randomUUID(),
        title: document.getElementById("inputTitle").value || "Sem Título",
        pages: parseInt(document.getElementById("inputPages").value) || 0,
        year: parseInt(document.getElementById("inputYear").value) || new Date().getFullYear(),
        status: document.getElementById("statusSelect").value,
        estrelas: selectedStars,
        favorito: livroExistente ? livroExistente.favorito : false,
        capa: selectedImage || "https://i.ibb.co/C07F1kL/placeholder-book-cover.png"
      };

      await saveBookDB(bookData);
      document.getElementById("modal").classList.remove("show");
      atualizarInterface();
    };

    // Inicialização do APP
    initDB().then(() => {
      atualizarInterface();
    });
  </script>
</body>
</html>
