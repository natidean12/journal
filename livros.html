<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cosmic Bloom Library ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-lavender: #d1c4e9;
      --secondary-berry: #a3617b;
      --accent-gold: #fbc02d;
      --bg-dark-purple: #3a2b4f;
      --bg-light-purple: #5c4b7d;
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.15);
      --text-light: #f8f8f8;
      --text-muted: #e0e0e0;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: var(--text-light);
      background: radial-gradient(circle at bottom left, var(--bg-light-purple) 0%, var(--bg-dark-purple) 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
    }

    /* Sidebar fixa */
    .sidebar {
      width: 250px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-right: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      padding: 30px 20px;
      position: fixed;
      height: 100vh;
      z-index: 1000;
    }

    .nav-brand { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--primary-lavender); text-align: center; margin-bottom: 40px; }
    
    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      padding: 14px 18px;
      border-radius: 25px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 15px;
      font-weight: 600;
    }

    .nav-link.active {
      background: linear-gradient(45deg, var(--secondary-berry) 0%, var(--primary-lavender) 100%);
      color: white;
    }

    /* Conteúdo Principal */
    .main-content { 
      margin-left: 250px; 
      padding: 40px; 
      flex: 1; 
      width: calc(100% - 250px);
    }

    /* Grid de Livros - O PULO DO GATO */
    .books-grid {
      display: grid;
      gap: 30px;
      /* No iPad/Desktop: Se o espaço for menor que 500px (2x250px), ele vira 1 coluna só */
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      justify-content: start;
    }

    .book-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      transition: transform 0.3s;
    }

    .book-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      border: 1px solid var(--card-border);
    }

    .stat-card strong { font-size: 1.8rem; color: var(--accent-gold); display: block; }

    /* Estilo para telas menores (Celular e iPad Portrait) */
    @media (max-width: 1024px) {
      .sidebar {
        width: 100%;
        height: 70px;
        position: fixed;
        bottom: 0;
        top: auto;
        flex-direction: row;
        justify-content: space-around;
        padding: 0;
        border-right: none;
        border-top: 1px solid var(--card-border);
      }
      .nav-brand { display: none; }
      .main-content { 
        margin-left: 0; 
        padding: 20px 20px 100px; 
        width: 100%;
      }
      /* No iPad Vertical/Celular: Forçamos uma coluna maior para não ficar "duas colunas magras" */
      .books-grid {
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        max-width: 500px;
        margin: 0 auto; /* Centraliza a coluna única */
      }
    }

    #addBtn {
      position: fixed; bottom: 40px; right: 40px;
      width: 60px; height: 60px; border-radius: 50%;
      background: var(--accent-gold); border: none; font-size: 2rem; z-index: 1100;
    }
    
    /* Reaproveitando seus modais anteriores aqui... */
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="nav-brand">Cosmic</div>
    <a href="#" class="nav-link active">📚 Livros</a>
    <a href="#" class="nav-link">🏆 Desafios</a>
    <a href="#" class="nav-link">💜 Favoritos</a>
  </nav>

  <main class="main-content">
    <div class="stats-container">
      <div class="stat-card"><small>Lidos</small><strong id="stLido">0</strong></div>
      <div class="stat-card"><small>Lendo</small><strong id="stLendo">0</strong></div>
    </div>
    <div id="yearContainers"></div>
  </main>

  <button id="addBtn">＋</button>

  <script>
    const dbName = "CosmicBloomDB";
    const storeName = "livros";
    let db;

    const initDB = () => {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(storeName)) {
            db.createObjectStore(storeName, { keyPath: "id" });
          }
        };
        request.onsuccess = (e) => {
          db = e.target.result;
          resolve(db);
        };
        request.onerror = (e) => reject("Erro ao abrir banco");
      });
    };

    const getAllBooks = () => {
      return new Promise((resolve) => {
        const transaction = db.transaction([storeName], "readonly");
        const store = transaction.objectStore(storeName);
        const request = store.getAll();
        request.onsuccess = () => resolve(request.result || []);
      });
    };

    const saveBookDB = (book) => {
      return new Promise((resolve) => {
        const transaction = db.transaction([storeName], "readwrite");
        const store = transaction.objectStore(storeName);
        store.put(book);
        transaction.oncomplete = () => resolve();
      });
    };

    const deleteBookDB = (id) => {
      return new Promise((resolve) => {
        const transaction = db.transaction([storeName], "readwrite");
        const store = transaction.objectStore(storeName);
        store.delete(id);
        transaction.oncomplete = () => resolve();
      });
    };

    let books = [];
    let selectedStars = 0;
    let selectedImage = "";
    let editId = null;

    async function atualizarInterface() {
      books = await getAllBooks();
      renderBooks();
    }

    function renderStarsHtml(val) {
      let html = '';
      for (let i = 1; i <= 5; i++) {
        if (i <= Math.floor(val)) html += '<span>★</span>';
        else if (i === Math.ceil(val) && val % 1 !== 0) html += '<span class="half-star">★</span>';
        else html += '<span style="color:rgba(255,255,255,0.2)">★</span>';
      }
      return html;
    }

    function renderBooks() {
      const container = document.getElementById("yearContainers");
      if(!container) return;
      container.innerHTML = "";
      
      const lidos = books.filter(b => b.status === 'lido');
      document.getElementById("totalPgs").innerText = lidos.reduce((acc, b) => acc + (parseInt(b.pages) || 0), 0).toLocaleString('pt-BR');
      document.getElementById("stLido").innerText = lidos.length;
      document.getElementById("stLendo").innerText = books.filter(b => b.status === 'lendo').length;
      document.getElementById("stFav").innerText = books.filter(b => b.favorito).length;
      
      const media = lidos.length ? (lidos.reduce((a,b) => a + (b.estrelas || 0), 0) / lidos.length).toFixed(1) : "0.0";
      document.getElementById("stMedia").innerText = media;

      // ORDENAÇÃO: Do mais novo para o mais antigo (usando timestamp)
      const years = [...new Set(books.map(b => b.year || new Date().getFullYear()))].sort((a,b) => b - a);
      
      years.forEach(year => {
        const section = document.createElement("div");
        section.innerHTML = `<h2 class="year-header">${year}</h2><div class="books-grid" id="grid-${year}"></div>`;
        container.appendChild(section);
        
        const sortedBooks = books
          .filter(b => (b.year || new Date().getFullYear()) == year)
          .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

        sortedBooks.forEach(book => {
          const card = document.createElement("div");
          card.className = "book-card";
          card.innerHTML = `
            <img src="${book.capa || 'https://i.ibb.co/C07F1kL/placeholder-book-cover.png'}" loading="lazy">
            <h3 style="font-size:1.1rem; margin:0 0 8px;">${book.title || 'Sem Título'}</h3>
            <div class="stars">${renderStarsHtml(book.estrelas || 0)}</div>
            <div class="book-actions">
              <button class="fav-btn">${book.favorito ? "💜" : "🤍"}</button>
              <button class="edit-btn">✏️</button>
              <button class="del-btn">🗑️</button>
            </div>
          `;
          
          card.querySelector(".del-btn").onclick = async function() {
            if (!this.classList.contains("warning")) {
              this.classList.add("warning");
              setTimeout(() => this.classList.remove("warning"), 2500);
            } else {
              await deleteBookDB(book.id);
              atualizarInterface();
            }
          };
          
          card.querySelector(".fav-btn").onclick = async () => { 
            book.favorito = !book.favorito; 
            await saveBookDB(book);
            atualizarInterface();
          };
          
          card.querySelector(".edit-btn").onclick = () => {
            editId = book.id; 
            selectedStars = book.estrelas; 
            selectedImage = book.capa;
            document.getElementById("inputTitle").value = book.title;
            document.getElementById("inputPages").value = book.pages;
            document.getElementById("inputYear").value = book.year;
            document.getElementById("statusSelect").value = book.status;
            atualizarEstrelasVisual();
            document.getElementById("modal").classList.add("show");
          };
          
          document.getElementById(`grid-${year}`).appendChild(card);
        });
      });
    }

    function comprimirImagem(file, callback) {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const max_size = 300; 
          let width = img.width;
          let height = img.height;
          if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } }
          else { if (height > max_size) { width *= max_size / height; height = max_size; } }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          callback(canvas.toDataURL('image/jpeg', 0.5)); 
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }

    document.getElementById("bookFile").onchange = e => {
      const file = e.target.files[0];
      if (file) comprimirImagem(file, (base64) => { selectedImage = base64; });
    };

    document.querySelectorAll("#starsSelect span").forEach((s, i) => {
      s.onclick = () => {
        let val = i + 1;
        if (selectedStars === val) selectedStars = val - 0.5;
        else if (selectedStars === (val - 0.5)) selectedStars = 0;
        else selectedStars = val;
        atualizarEstrelasVisual();
      };
    });

    function atualizarEstrelasVisual() {
      document.querySelectorAll("#starsSelect span").forEach((s, i) => {
        let val = i + 1;
        s.classList.remove("selected", "half-selected");
        if (val <= Math.floor(selectedStars)) s.classList.add("selected");
        else if (val === Math.ceil(selectedStars) && selectedStars % 1 !== 0) s.classList.add("half-selected");
      });
    }

    document.getElementById("addBtn").onclick = () => {
      editId = null; selectedStars = 0; selectedImage = "";
      document.getElementById("inputTitle").value = "";
      document.getElementById("inputPages").value = "";
      atualizarEstrelasVisual();
      document.getElementById("modal").classList.add("show");
    };

    document.getElementById("closeModal").onclick = () => document.getElementById("modal").classList.remove("show");

    document.getElementById("saveBook").onclick = async () => {
      const currentTimestamp = editId ? (books.find(b => b.id === editId)?.timestamp || Date.now()) : Date.now();
      const bookData = {
        id: editId || crypto.randomUUID(),
        timestamp: currentTimestamp,
        title: document.getElementById("inputTitle").value || "Sem Título",
        pages: parseInt(document.getElementById("inputPages").value) || 0,
        year: parseInt(document.getElementById("inputYear").value) || new Date().getFullYear(),
        status: document.getElementById("statusSelect").value,
        estrelas: selectedStars,
        favorito: editId ? books.find(b => b.id === editId).favorito : false,
        capa: selectedImage || "https://i.ibb.co/C07F1kL/placeholder-book-cover.png"
      };
      await saveBookDB(bookData);
      document.getElementById("modal").classList.remove("show");
      atualizarInterface();
    };

    initDB().then(() => { atualizarInterface(); });
  </script>
</body>
</html>
