<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Cosmic Bloom Library ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-lavender: #d1c4e9;
      --secondary-berry: #a3617b;
      --accent-gold: #fbc02d;
      --bg-dark-purple: #3a2b4f;
      --bg-light-purple: #5c4b7d;
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.15);
      --text-light: #f8f8f8;
      --text-muted: #e0e0e0;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: var(--text-light);
      background: radial-gradient(circle at bottom left, var(--bg-light-purple) 0%, var(--bg-dark-purple) 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
    }

    h1, h2, .nav-brand { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; color: var(--primary-lavender); }

    .sidebar {
      width: 250px;
      background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-right: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      padding: 30px 20px;
      position: fixed;
      height: 100vh;
      z-index: 1000;
      overflow-y: auto;
    }

    .main-content { 
      margin-left: 250px; 
      padding: 40px; 
      flex: 1; 
      width: calc(100% - 250px);
    }

    .nav-brand { font-size: 2.2rem; text-align: center; margin-bottom: 40px; }
    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      padding: 14px 18px;
      border-radius: 25px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 15px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .nav-link.active {
      background: linear-gradient(45deg, var(--secondary-berry) 0%, var(--primary-lavender) 100%);
      color: white;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      padding-bottom: 30px;
    }

    .pages-badge {
      background: var(--accent-gold);
      color: var(--bg-dark-purple);
      padding: 10px 22px;
      border-radius: 50px;
      font-weight: 700;
    }

    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 20px;
      border-radius: 20px;
      text-align: center;
    }
    .stat-card strong { font-size: 1.8rem; display: block; color: var(--accent-gold); }

    .books-grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }

    .book-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 12px;
      text-align: center;
    }
    .book-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    /* --- AJUSTES DE RESPONSIVIDADE (FIX TAMANHO TELA) --- */
    @media (max-width: 768px) {
      body { display: block; }
      .sidebar { 
        width: 100%; 
        height: 70px; 
        bottom: 0; 
        top: auto; 
        flex-direction: row; 
        padding: 0 10px; 
        justify-content: space-around;
        border-right: none;
        border-top: 1px solid var(--card-border);
      }
      .nav-brand { display: none; }
      .nav-link { padding: 8px; margin: 0; font-size: 0.7rem; flex-direction: column; gap: 4px; }
      
      .main-content { 
        margin-left: 0 !important; 
        padding: 20px 15px 100px; 
        width: 100%; 
      }
      .books-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      #addBtn { bottom: 85px; right: 20px; width: 55px; height: 55px; }
    }

    /* Resto dos estilos (Modais, Botões, etc) */
    .stars { color: var(--accent-gold); margin-bottom: 10px; }
    .book-actions { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
    .book-actions button { background: rgba(255,255,255,0.1); border: none; padding: 8px; border-radius: 8px; cursor: pointer; color: white; }
    
    #addBtn {
      position: fixed; bottom: 40px; right: 40px;
      width: 60px; height: 60px; border-radius: 50%;
      background: var(--accent-gold); border: none; font-size: 2rem; cursor: pointer; z-index: 1100;
    }

    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: none; align-items: center; justify-content: center; z-index: 2000;
    }
    .modal.show { display: flex; }
    .modal-content { background: var(--bg-dark-purple); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; }
  </style>
</head>
<body>

  <nav class="sidebar">
    <div class="nav-brand">Cosmic</div>
    <a href="#" class="nav-link active"><i>📚</i> Livros</a>
    <a href="#" class="nav-link"><i>🏆</i> Desafios</a>
    <a href="#" class="nav-link"><i>📅</i> Agenda</a>
    <a href="#" class="nav-link"><i>💜</i> Favs</a>
  </nav>

  <main class="main-content">
    <div class="top-bar">
      <div class="pages-badge">✨ <span id="totalPgs">0</span> pgs lidas</div>
    </div>

    <div class="stats-container">
      <div class="stat-card"><small>Lidos</small><strong id="stLido">0</strong></div>
      <div class="stat-card"><small>Lendo</small><strong id="stLendo">0</strong></div>
      <div class="stat-card"><small>Favs</small><strong id="stFav">0</strong></div>
    </div>
    
    <div id="yearContainers"></div>
  </main>

  <button id="addBtn">＋</button>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2 style="margin-top:0">Novo Livro</h2>
      <input type="file" id="bookFile" accept="image/*">
      <input type="text" id="inputTitle" placeholder="Título"> 
      <input type="number" id="inputPages" placeholder="Páginas">
      <input type="number" id="inputYear" placeholder="Ano" value="2026">
      <select id="statusSelect">
        <option value="lido">📕 Lido</option>
        <option value="lendo">📖 Lendo</option>
        <option value="quero">📘 Quero Ler</option>
      </select>
      <div class="modal-buttons" style="display:flex; gap:10px; margin-top:15px;">
        <button id="saveBook" style="flex:1; padding:12px; background:var(--accent-gold); border:none; border-radius:10px; font-weight:bold;">Salvar</button>
        <button id="closeModal" style="flex:1; padding:12px; background:#666; color:white; border:none; border-radius:10px;">Fechar</button>
      </div>
    </div>
  </div>

  <script>
    const dbName = "CosmicBloomDB";
    const storeName = "livros";
    let db, books = [], selectedImage = "", editId = null;

    const initDB = () => {
      return new Promise((resolve) => {
        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = (e) => e.target.result.createObjectStore(storeName, { keyPath: "id" });
        request.onsuccess = (e) => { db = e.target.result; resolve(); };
      });
    };

    const getAllBooks = () => {
      return new Promise((resolve) => {
        const store = db.transaction([storeName], "readonly").objectStore(storeName);
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result || []);
      });
    };

    async function atualizarInterface() {
      books = await getAllBooks();
      
      // ORDENAÇÃO: Garante que os últimos adicionados apareçam primeiro
      books.sort((a, b) => (b.dataCriacao || 0) - (a.dataCriacao || 0));
      
      renderBooks();
    }

    function renderBooks() {
      const container = document.getElementById("yearContainers");
      container.innerHTML = "";
      
      // Atualiza Stats
      const lidos = books.filter(b => b.status === 'lido');
      document.getElementById("totalPgs").innerText = lidos.reduce((acc, b) => acc + (parseInt(b.pages) || 0), 0);
      document.getElementById("stLido").innerText = lidos.length;
      document.getElementById("stLendo").innerText = books.filter(b => b.status === 'lendo').length;
      document.getElementById("stFav").innerText = books.filter(b => b.favorito).length;

      const years = [...new Set(books.map(b => b.year))].sort((a,b) => b - a);
      
      years.forEach(year => {
        const div = document.createElement("div");
        div.innerHTML = `<h2 class="year-header" style="border-bottom: 1px solid var(--card-border); padding-bottom:10px; margin-top:30px;">${year}</h2>
                         <div class="books-grid" id="grid-${year}"></div>`;
        container.appendChild(div);
        
        books.filter(b => b.year == year).forEach(book => {
          const card = document.createElement("div");
          card.className = "book-card";
          card.innerHTML = `
            <img src="${book.capa || 'https://via.placeholder.com/150'}">
            <div style="font-weight:600; font-size:0.9rem; margin-bottom:5px;">${book.title}</div>
            <div class="book-actions">
              <button onclick="toggleFav('${book.id}')">${book.favorito ? "💜" : "🤍"}</button>
              <button onclick="deletarLivro('${book.id}')">🗑️</button>
            </div>
          `;
          document.getElementById(`grid-${year}`).appendChild(card);
        });
      });
    }

    // Ações
    window.toggleFav = async (id) => {
      const book = books.find(b => b.id === id);
      book.favorito = !book.favorito;
      const tx = db.transaction([storeName], "readwrite");
      tx.objectStore(storeName).put(book);
      tx.oncomplete = atualizarInterface;
    };

    window.deletarLivro = async (id) => {
      if(confirm("Excluir este livro?")) {
        const tx = db.transaction([storeName], "readwrite");
        tx.objectStore(storeName).delete(id);
        tx.oncomplete = atualizarInterface;
      }
    };

    document.getElementById("saveBook").onclick = async () => {
      const bookData = {
        id: editId || crypto.randomUUID(),
        dataCriacao: editId ? books.find(b => b.id === editId).dataCriacao : Date.now(), // TIMESTAMP PARA ORDEM
        title: document.getElementById("inputTitle").value || "Sem Título",
        pages: parseInt(document.getElementById("inputPages").value) || 0,
        year: parseInt(document.getElementById("inputYear").value) || 2026,
        status: document.getElementById("statusSelect").value,
        favorito: false,
        capa: selectedImage
      };

      const tx = db.transaction([storeName], "readwrite");
      tx.objectStore(storeName).put(bookData);
      tx.oncomplete = () => {
        document.getElementById("modal").classList.remove("show");
        atualizarInterface();
      };
    };

    // Imagem e Modal
    document.getElementById("bookFile").onchange = e => {
      const reader = new FileReader();
      reader.onload = () => selectedImage = reader.result;
      reader.readAsDataURL(e.target.files[0]);
    };
    document.getElementById("addBtn").onclick = () => {
      editId = null; selectedImage = ""; document.getElementById("modal").classList.add("show");
    };
    document.getElementById("closeModal").onclick = () => document.getElementById("modal").classList.remove("show");

    initDB().then(atualizarInterface);
  </script>
</body>
</html>
