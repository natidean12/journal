<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cosmic Calendar ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  <meta name="apple-mobile-web-app-title" content="Cosmic Bloom">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  
  <style>
    /* Paleta de cores em tom de rosa idêntica à tela principal */
    :root {
      --primary-rose: #fcaec1;      
      --soft-pink: #fbc8d4;         
      --vintage-gold: #cca05a;      
      --bg-overlay: rgba(58, 29, 33, 0.65); 
      --card-bg: rgba(255, 255, 255, 0.08); 
      --card-border: rgba(251, 200, 212, 0.2);
      --text-light: #fff2f5;
      --text-muted: #fbc8d4;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: var(--text-light);
      /* Fundo estelar com overlay idêntico à tela de livros */
      background: 
        linear-gradient(var(--bg-overlay), var(--bg-overlay)),
        url("https://i.pinimg.com/1200x/1d/72/41/1d72416e266789afa33c189c365ded82.jpg") no-repeat center / cover;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 250px;
      background: rgba(58, 29, 33, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      padding: 30px 20px;
      position: fixed;
      height: 100vh;
      z-index: 1000;
      overflow-y: auto;
      box-shadow: 2px 0 15px rgba(0,0,0,0.2);
    }
    
    .nav-brand { 
      font-family: 'Playfair Display', serif; 
      font-style: italic; 
      font-weight: 700; 
      color: var(--soft-pink); 
      font-size: 2.2rem; 
      text-align: center; 
      margin-bottom: 40px; 
      text-shadow: 0 0 15px rgba(251, 200, 212, 0.3); 
    }
    
    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      padding: 14px 18px;
      border-radius: 25px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 15px;
      font-weight: 600;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .nav-link::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.1);
      transition: all 0.4s ease;
    }
    
    .nav-link:hover::before { left: 0; }
    
    .nav-link.active {
      background: linear-gradient(135deg, var(--soft-pink), var(--primary-rose));
      color: #3a1d21;
      box-shadow: 0 8px 20px rgba(252, 174, 193, 0.3);
      transform: translateX(5px);
    }
    .nav-link i { font-size: 1.3rem; }

    /* MAIN CONTENT */
    .main-content { margin-left: 250px; padding: 40px; flex: 1; display: flex; flex-direction: column; align-items: center; }

    .calendar-card {
      background: var(--card-bg); backdrop-filter: blur(10px);
      border: 1px solid var(--card-border); padding: 30px;
      border-radius: 40px; width: 100%; max-width: 500px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }

    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .calendar-header h2 { font-family: 'Playfair Display', serif; color: var(--soft-pink); margin: 0; }
    
    .btn-nav { 
      background: rgba(255,255,255,0.1); border: 1px solid var(--card-border); 
      width: 40px; height: 40px; border-radius: 12px; cursor: pointer; color: white;
    }

    .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }

    .day {
      aspect-ratio: 1; background: rgba(255,255,255,0.03);
      border: 1px solid var(--card-border); border-radius: 12px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; font-size: 0.85rem; transition: 0.2s;
      animation: fadeIn 0.4s ease-out;
    }

    /* DESTAQUE HOJE */
    .day.today {
      border: 2px solid var(--vintage-gold);
      box-shadow: 0 0 15px rgba(204, 160, 90, 0.4);
      font-weight: 800;
    }

    /* Ajuste do preenchimento rosa quando marcado */
    .day.marked { 
      background: linear-gradient(135deg, var(--soft-pink), var(--primary-rose));
      color: #3a1d21; border: none;
      font-weight: 600;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* CHIPS DE EMOJIS */
    .emoji-selector-horizontal {
      display: flex; gap: 10px; margin: 25px 0;
      background: var(--card-bg); padding: 10px; border-radius: 20px;
      border: 1px solid var(--card-border);
    }

    .emoji-chip {
      padding: 8px 15px; border-radius: 15px; cursor: pointer;
      background: rgba(255,255,255,0.05); border: 1px solid transparent;
      transition: 0.3s; font-size: 1.2rem;
    }

    .emoji-chip.selected {
      background: linear-gradient(135deg, var(--soft-pink), var(--primary-rose));
      border-color: var(--soft-pink);
      transform: scale(1.1);
    }

    .status-box {
      display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
      width: 100%; max-width: 500px; padding-bottom: 100px;
    }
    
    .stat-mini { 
      background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
      padding: 20px; border-radius: 25px; text-align: center;
      border: 1px solid var(--card-border);
    }
    
    .stat-mini span { display: block; font-size: 0.65rem; color: var(--soft-pink); font-weight: bold; text-transform: uppercase; }
    .stat-mini strong { font-size: 1.8rem; color: #ffffff; }

    @media (max-width: 768px) {
      .sidebar { width: 100%; height: 75px; bottom: 0; top: auto; flex-direction: row; padding: 0; border-right: none; border-top: 1px solid var(--card-border); background: rgba(58, 29, 33, 0.95); }
      .nav-brand { display: none; }
      .main-content { margin-left: 0; padding: 20px 15px 120px; }
      .nav-link { flex-direction: column; font-size: 0.6rem; gap: 2px; justify-content: center; margin-bottom: 0; }
    }
  </style>
</head>
<body>

  <nav class="sidebar">
    <div class="nav-brand">Cosmic Bloom</div>
    <a href="livros.html" class="nav-link"><i>📚</i> Livros</a>
    <a href="challenge.html" class="nav-link"><i>🏆</i> Desafios</a>
    <a href="calendario.html" class="nav-link active"><i>📅</i> Agenda</a>
    <a href="favoritos.html" class="nav-link"><i>💜</i> Favoritos</a>
    <a href="bingo.html" class="nav-link"><i>🎯</i> Bingo Literário</a>
    <a href="cores.html" class="nav-link"><i>🌈</i> Paleta Literária</a>
    <a href="A-z.html" class="nav-link"><i>🅰️</i> Desafio A-Z</a>
    <a href="roleta.html" class="nav-link"><i>📍</i> Roleta</a>
  </nav>

  <main class="main-content">
    <div class="calendar-card">
      <div class="calendar-header">
        <button class="btn-nav" id="prevMonth">◀</button>
        <h2 id="monthTitle">Janeiro 2026</h2>
        <button class="btn-nav" id="nextMonth">▶</button>
      </div>

      <div class="grid" id="calendarGrid"></div>
    </div>

    <div class="emoji-selector-horizontal" id="emojiSelector">
      <div class="emoji-chip selected" data-emoji="📖">📖</div>
      <div class="emoji-chip" data-emoji="✨">✨</div>
      <div class="emoji-chip" data-emoji="🔥">🔥</div>
      <div class="emoji-chip" data-emoji="⭐">⭐</div>
      <div class="emoji-chip" data-emoji="🌙">🌙</div>
    </div>

    <div class="status-box">
      <div class="stat-mini">
        <span>Leituras do Mês</span>
        <strong id="countDays">0</strong>
      </div>
      <div class="stat-mini">
        <span>Sequência Atual</span>
        <strong id="streakCount">0 🔥</strong>
      </div>
    </div>
  </main>

  <script>
    // --- TRAVAR ZOOM GESTUAL NO IPAD (HOME SCREEN PWA) ---
    document.addEventListener('gesturestart', function (e) {
      e.preventDefault();
    });

    let currentDate = new Date();
    let selectedEmoji = "📖";
    let habitData = JSON.parse(localStorage.getItem("moniteca_calendar")) || {};

    const grid = document.getElementById("calendarGrid");
    const monthTitle = document.getElementById("monthTitle");

    // Lógica dos Chips de Emoji
    document.querySelectorAll('.emoji-chip').forEach(chip => {
      chip.onclick = function() {
        document.querySelector('.emoji-chip.selected').classList.remove('selected');
        this.classList.add('selected');
        selectedEmoji = this.dataset.emoji;
      };
    });

    function render() {
      grid.innerHTML = "";
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const today = new Date();
      
      const firstDay = new Date(year, month, 1).getDay();
      const lastDay = new Date(year, month + 1, 0).getDate();
      
      const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
      monthTitle.innerText = `${monthNames[month]} ${year}`;

      for (let i = 0; i < firstDay; i++) {
        grid.appendChild(document.createElement("div"));
      }

      for (let d = 1; d <= lastDay; d++) {
        const dayKey = `${year}-${month}-${d}`;
        const dayDiv = document.createElement("div");
        dayDiv.className = "day";
        
        // Destacar dia de hoje
        if (d === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
          dayDiv.classList.add("today");
        }

        if (habitData[dayKey]) {
          dayDiv.classList.add("marked");
          dayDiv.innerHTML = `<span style="font-size:0.7rem; opacity:0.8; display:block;">${d}</span><span>${habitData[dayKey]}</span>`;
        } else {
          dayDiv.innerText = d;
        }

        dayDiv.onclick = function() {
          if (habitData[dayKey]) {
            delete habitData[dayKey];
          } else {
            habitData[dayKey] = selectedEmoji;
          }
          save();
          render();
        };
        grid.appendChild(dayDiv);
      }
      updateStats();
    }

    function updateStats() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const daysInMonth = Object.keys(habitData).filter(key => key.startsWith(`${year}-${month}-`)).length;
      document.getElementById("countDays").innerText = daysInMonth;

      let streak = 0;
      let check = new Date();
      while(true) {
        let k = `${check.getFullYear()}-${check.getMonth()}-${check.getDate()}`;
        if(habitData[k]) { streak++; check.setDate(check.getDate()-1); }
        else break;
      }
      document.getElementById("streakCount").innerText = streak + " 🔥";
    }

    function save() { localStorage.setItem("moniteca_calendar", JSON.stringify(habitData)); }

    document.getElementById("prevMonth").onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); render(); };
    document.getElementById("nextMonth").onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); render(); };

    render();
  </script>
</body>
</html>
